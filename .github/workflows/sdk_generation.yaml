name: Generate SDK
permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write
  id-token: write
"on":
  repository_dispatch:
        types: openapi_published
  workflow_dispatch:
    inputs:
      force:
        description: Force generation of SDKs
        type: boolean
        default: false
      set_version:
        description: optionally set a specific SDK version
        type: string
  schedule:
    - cron: 0 0 * * *
jobs:
  generate:
    uses: speakeasy-api/sdk-generation-action/.github/workflows/workflow-executor.yaml@fe37b336cd1948f1e2e60383fd94bfb884318cf2 # v15
    with:
      force: ${{ github.event.inputs.force }}
      mode: pr
      set_version: ${{ github.event.inputs.set_version }}
    secrets:
      github_access_token: ${{ secrets.GITHUB_TOKEN }}
      nuget_api_key: ${{ secrets.NUGET_API_KEY }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}

  patch_update_models:
    needs: generate
    if: ${{ needs.generate.outputs.csharp_regenerated == 'true' && needs.generate.outputs.branch_name != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout generated branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.generate.outputs.branch_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply tri-state nullable patch to *Update models
        run: python3 .speakeasy/scripts/patch_update_models.py
      - name: Commit and push patch
        run: |
          if git diff --quiet -- src/Gr4vy/Models/Components; then
            echo "No tri-state patches to apply; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/Gr4vy/Models/Components
          git commit -m "fix: re-apply tri-state nullable patch to *Update models"
          git push origin HEAD:${{ needs.generate.outputs.branch_name }}

  notify:
    needs: [generate, patch_update_models]
    runs-on: ubuntu-latest
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    steps:
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2
        if: github.ref == 'refs/heads/main'
        env:
            SLACK_USERNAME: C# SDK 
            SLACK_TITLE: C# SDK
            SLACK_WEBHOOK: ${{ secrets.SLACK_SDK_WEBHOOK_URL }}
            SLACK_CHANNEL: sdk-updates
            SLACK_MSG_AUTHOR: gr4vy-code
            SLACK_ICON_EMOJI: ":gr4vy:"
            SLACK_COLOR: "${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}"
            SLACK_MESSAGE_ON_SUCCESS: "SDK generation succeeded"
            SLACK_MESSAGE_ON_FAILURE: "SDK generation failed"
            SLACK_FOOTER: ""